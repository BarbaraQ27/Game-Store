name: Deploy to GH Pages

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@master
        with:
          persist-credentials: false

      - name: Install 🔧
        run: yarn install

      - name: Build 🏗️
        run: yarn build
        env:
          # GitHub inyecta los Secrets como variables de entorno durante el build.
          # Vite las embebe en el bundle igual que si estuvieran en tu .env local.
          VITE_RAWG_API_KEY: ${{ secrets.VITE_RAWG_API_KEY }}
          VITE_REQRES_PUBLIC_KEY: ${{ secrets.VITE_REQRES_PUBLIC_KEY }}

      - name: Deploy to GH Pages 🚀
        if: ${{ github.event_name != 'pull_request' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
